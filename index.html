<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <title>Start Screen</title>
</head>
<body>
 <div id="screen-start" class="container">
  <h1>Welcome to the Game</h1>
  <button class="start-btn" onclick="showNickname()">Start</button>
</div>

<div id="screen-nickname" class="container" style="display:none;">
  <h1>Enter your nickname</h1>
  <p>Choose a name to appear in the game</p>
  <input id="nickname" type="text" placeholder="Your nickname..." maxlength="20" />
  <p id="error-msg" style="color:red; font-size:0.85rem; min-height:18px;"></p>
  <button class="start-btn" onclick="submitNickname()">Let's go!</button>
</div>

  
  <script src="script.js"></script>
</body>
</html>
